<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <!-- Editorial neutral background: foreground-tinted radial wash -->
    <radialGradient id="bgWash" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0" />
    </radialGradient>

    <!-- Faint editorial grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#475569" stroke-width="0.5" stroke-opacity="0.18" />
    </pattern>
  </defs>

  <!-- Flat editorial background -->
  <rect width="100%" height="100%" fill="#0a0e17" />
  <rect width="100%" height="100%" fill="url(#bgWash)" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Gold top rule (editorial) -->
  <rect x="0" y="0" width="800" height="2" fill="#f59e0b" opacity="0.8" />

  <!-- Decorative connector lines in muted foreground -->
  <g opacity="0.25" stroke="#94a3b8" stroke-width="1.25" fill="none">
    <path d="M100,100 L200,100 L200,150 L300,150 L300,200 L400,200" />
    <path d="M500,300 L600,300 L600,250 L700,250" />
    <path d="M150,350 L150,300 L250,300 L250,200" />
  </g>
  <g fill="#94a3b8" opacity="0.4">
    <circle cx="100" cy="100" r="3" />
    <circle cx="200" cy="100" r="3" />
    <circle cx="300" cy="150" r="3" />
    <circle cx="400" cy="200" r="3" />
    <circle cx="600" cy="300" r="3" />
    <circle cx="700" cy="250" r="3" />
    <circle cx="150" cy="350" r="3" />
    <circle cx="250" cy="200" r="3" />
  </g>

  <!-- Center mark: bordered amber chip with book glyph -->
  <g transform="translate(400, 190)">
    <circle cx="0" cy="0" r="56" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <circle cx="0" cy="0" r="56" fill="#f59e0b" opacity="0.06" />
    <!-- Book icon (foreground stroke) -->
    <g stroke="#f8fafc" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-22,-14 L-22,16 C-22,16 -9,11 0,11 C9,11 22,16 22,16 L22,-14 C22,-14 9,-19 0,-19 C-9,-19 -22,-14 -22,-14 Z" />
      <path d="M0,-19 L0,11" />
    </g>
  </g>

  <!-- Editorial eyebrow label -->
  <text x="400" y="296" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="2.5" fill="#f59e0b" text-anchor="middle">COURSE</text>
  <text x="400" y="324" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#f8fafc" text-anchor="middle">Course Content</text>
</svg>
